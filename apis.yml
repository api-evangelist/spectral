aid: spectral
name: Spectral
description: >-
  Spectral is an open-source API style guide enforcer and linter from Stoplight,
  providing a flexible JSON/YAML linting engine with built-in support for
  OpenAPI (v3.1, v3.0, v2.0), Arazzo v1.0, and AsyncAPI v2.x. Teams use
  Spectral to define, share, and enforce API design standards through custom
  rulesets, integrating into CI/CD pipelines, VS Code, and the Stoplight
  Platform for real-time style guide feedback.
